name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: ./bot
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
    
    - name: Run linter (flake8)
      working-directory: ./bot
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run tests
      working-directory: ./bot
      run: |
        pytest tests/ -v --tb=short
    
    - name: Check security (pip-audit)
      working-directory: ./bot
      run: |
        pip install pip-audit
        # PYSEC-2026-161 requires Starlette >=1.0.1, which is tied to the later FastAPI/Pydantic v2 migration.
        # Security-sensitive path checks use raw ASGI scope["path"] until that dependency migration lands.
        pip-audit --desc -r requirements.txt --ignore-vuln PYSEC-2026-161

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json
    
    - name: Install dependencies
      working-directory: ./web
      run: npm ci
    
    - name: Run linter (ESLint)
      working-directory: ./web
      run: npm run lint
    
    - name: Run tests
      working-directory: ./web
      run: npm test -- --coverage --watchAll=false
    
    - name: Check security (npm audit)
      working-directory: ./web
      run: npm audit --audit-level=moderate

  security-audit:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json
    
    - name: Backend security audit
      working-directory: ./bot
      run: |
        pip install pip-audit
        # PYSEC-2026-161 requires Starlette >=1.0.1, which is tied to the later FastAPI/Pydantic v2 migration.
        # Security-sensitive path checks use raw ASGI scope["path"] until that dependency migration lands.
        pip-audit --desc -r requirements.txt --ignore-vuln PYSEC-2026-161
    
    - name: Frontend security audit
      working-directory: ./web
      run: |
        npm audit --audit-level=high
