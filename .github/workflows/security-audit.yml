name: Security Audit

on:
  schedule:
    # Run weekly on Monday
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Backend security audit
      working-directory: ./bot
      run: |
        pip install pip-audit
        # PYSEC-2026-161 requires Starlette >=1.0.1, which is tied to the later FastAPI/Pydantic v2 migration.
        # Security-sensitive path checks use raw ASGI scope["path"] until that dependency migration lands.
        pip-audit --desc --format=json -r requirements.txt --ignore-vuln PYSEC-2026-161 > backend-audit.json
    
    - name: Frontend security audit
      working-directory: ./web
      run: npm audit --json > frontend-audit.json
    
    - name: Upload audit results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-audit-results
        path: |
          bot/backend-audit.json
          web/frontend-audit.json
        if-no-files-found: warn

