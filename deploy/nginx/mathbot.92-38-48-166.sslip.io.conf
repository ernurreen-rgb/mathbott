upstream mathbot_frontend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name mathbot.92-38-48-166.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mathbot.92-38-48-166.sslip.io;

    ssl_certificate /etc/letsencrypt/live/mathbot.92-38-48-166.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mathbot.92-38-48-166.sslip.io/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://mathbot_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
