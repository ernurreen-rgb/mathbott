services:
  backend:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: mathbot-backend-prod
    environment:
      ENVIRONMENT: production
      PORT: 8000
      DB_PATH: /data/mathbot.db
      BANK_TRASH_RETENTION_DAYS: 30
      ALLOWED_ORIGINS: https://${APP_DOMAIN}
      INTERNAL_PROXY_SHARED_SECRET: ${INTERNAL_PROXY_SHARED_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      CSRF_ENABLED: "true"
      SENTRY_DSN: ${SENTRY_DSN:-}
      ALERTS_ENABLED: ${ALERTS_ENABLED:-false}
      ALERT_TELEGRAM_ENABLED: ${ALERT_TELEGRAM_ENABLED:-false}
      ALERT_TELEGRAM_BOT_TOKEN: ${ALERT_TELEGRAM_BOT_TOKEN:-}
      ALERT_TELEGRAM_CHAT_ID: ${ALERT_TELEGRAM_CHAT_ID:-}
    expose:
      - "8000"
    volumes:
      - mathbot_db:/data
      - mathbot_images:/images
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mathbot-frontend-prod
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: /api/backend
      NEXTAUTH_URL: https://${APP_DOMAIN}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      INTERNAL_PROXY_SHARED_SECRET: ${INTERNAL_PROXY_SHARED_SECRET}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT:-3001}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  mathbot_db:
  mathbot_images:
