# Alembic configuration for the Mathbot backend.
# The database URL is injected programmatically (see migrations/runner.py);
# sqlalchemy.url here is only a fallback for manual CLI usage, e.g.:
#   cd bot && alembic upgrade head
#   cd bot && alembic revision -m "add column foo"

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = %(here)s
path_separator = os
sqlalchemy.url = sqlite:///mathbot.db
